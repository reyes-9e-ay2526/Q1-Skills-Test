<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Q1 Skills Test</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
	<div class="box">
		<div class="title">
			<img src="OBMC EST 1966 .png">
			<h1>OBMC Robotics Club Application Form</h1>
		</div>
		
		<div class="form">
			<p>Welcome! Please fill out this form to apply for our School's Robotics Club.</p>
			<fieldset>
				<label for="fullname">Full name: </label>
				<input type="text" name="fullname">
				<br>
				<label for="email">Email: </label>
				<input type="text" name="email">
				<br>
				<label for="grade level">Grade level: </label>
				<select>
					<option value="grade 7"> grade 7 </option>
					<option value="grade 8"> grade 8 </option>
					<option value="grade 9"> grade 9 </option>
					<option value="grade 10"> grade 10 </option>
					<option value="grade 11"> grade 11 </option>
					<option value="grade 12"> grade 12 </option>
				</select>
				<br>
				<legend>
				
				</fieldset>
				<fieldset>
					<legend> Gender: </legend> <br>

					<input type="radio" name="gender"> <label> Male </label>

					<input type="radio" name="gender"> <label> Female </label>
				</fieldset>
				<fieldset>
					<legend> What are your skills? </legend> 

					<input type="radio" name="skills"> <label> Coding </label>

					<input type="radio" name="skills"> <label> Design </label>

					<input type="radio" name="skills"> <label> Electronics </label> <br>
				
				<br>
				<label>Tell us why you want to join:</label> <br>
				
				<textarea cols="40" rows="4" placeholder="feedback..."></textarea>
		

			</fieldset>

		</div>
		<fieldset>
		<div class="activities">
			<label>Top Robotics Activities We Offer:</label>
				<ul>
					<li>Line Following Robots</li>
				</ul>
				<ul>
					<li>Obstacle Avoidance Programming</li>
				</ul>
				<ul>
					<li>Light Following Robot</li>
				</ul>
			<br>
			<label>Helpful links:</label>
			<ul>
					<li>
						<a href="https://www.automate.org/robotics"> Robotics.org</a>
					</li>
				</ul>
				<ul>
					<li>
						<a href="https://www.firstinspires.org/">FIRST Robotics</a>
					</li>
				</ul>
		</fieldset>	
		<input type="submit" class="submit" value="Submit Application">

		</div>

	</div>

</body>
</html>
